name: Multi-Node Watchdog Pulse

on:
  schedule:
    - cron: "*/15 * * * *" # Run every 15 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Tunnel URL and Pulse
        id: check
        run: |
          # Extract URL from index.html (updated by local monitor)
          TUNNEL_URL=$(grep 'githubOnboardingUrl =' index.html | grep -o 'https://[^"]*' | head -n 1)
          echo "Target Tunnel: $TUNNEL_URL"

          if [ -z "$TUNNEL_URL" ]; then
            echo "::warning::Tunnel URL not found in index.html"
            echo "online=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Ping the health endpoint
          RESPONSE=$(curl -s -f "$TUNNEL_URL/health" -o response.json || echo 'FAILED')
          echo "Response: $RESPONSE"

          if [ "$RESPONSE" = "FAILED" ]; then
             echo "::warning::Curl failed to reach $TUNNEL_URL. Tunnel is offline."
             echo "online=false" >> $GITHUB_OUTPUT
             exit 0
          fi

          cat response.json
          STATUS=$(jq -r '.status' response.json 2>/dev/null || echo "dead")

          if [ "$STATUS" != "healthy" ]; then
            echo "::warning::Portal reported status: $STATUS. Tunnel is offline."
            echo "online=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Portal is ALIVE and HEALTHY."
          echo "online=true" >> $GITHUB_OUTPUT

      - name: Log Pulse
        if: steps.check.outputs.online == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          mkdir -p data/logs
          echo "[$TIMESTAMP] Heartbeat: OK" >> data/logs/watchdog_pulse.log

          # Only keep last 100 entries
          tail -n 100 data/logs/watchdog_pulse.log > data/logs/watchdog_pulse.log.tmp
          mv data/logs/watchdog_pulse.log.tmp data/logs/watchdog_pulse.log

      - name: Commit Pulse (Status Badge Data)
        if: steps.check.outputs.online == 'true'
        run: |
          git config --global user.name "Watchdog Bot"
          git config --global user.email "watchdog@sovereign-intelligence.org"
          git add -f data/logs/watchdog_pulse.log
          git commit -m "Watchdog Pulse: Heartbeat Sync [$(date -u)]" || echo "No changes to commit"
          git push || echo "Push failed (possibly concurrent update)"
