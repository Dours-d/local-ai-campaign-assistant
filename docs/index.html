    <script>
        // Pointing to the Permanent Vercel Funnel
        var githubOnboardingUrl = "https://jay-posted-related-tooth.trycloudflare.com";

        // Handle hash routing for deep links
        var hash = window.location.hash;
        var githubOnboardingUrl = "https://jay-posted-related-tooth.trycloudflare.com";

        if (hash && hash.length > 1) {
            // Clean hash to isolate ID
            var cleanHash = hash.substring(1);
            // Remove common prefixes if present, to just get the raw ID
            if (cleanHash.startsWith('/onboard/')) cleanHash = cleanHash.replace('/onboard/', '');
            else if (cleanHash.startsWith('onboard/')) cleanHash = cleanHash.replace('onboard/', '');
            else if (cleanHash.startsWith('/')) cleanHash = cleanHash.substring(1);

            // Construct correct Vercel path: /onboard/ID
            destination = "/onboard/" + cleanHash;
        } else {
            destination = "/onboard";
        }

        var search = window.location.search || "";
        var finalUrl = githubOnboardingUrl + destination + search;

        document.getElementById("link").href = finalUrl;
        document.getElementById("msg").innerText = "Redirecting to Sovereign Portal...";
        setTimeout(() => { window.location.replace(finalUrl); }, 1000);
    </script>
