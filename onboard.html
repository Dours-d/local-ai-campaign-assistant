<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Gaza Resilience Portal...</title>
    <style>
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1612;
            color: #d4a373;
        }

        .box {
            text-align: center;
            padding: 2.5rem;
            background: rgba(212, 163, 115, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(212, 163, 115, 0.1);
        }

        a {
            color: #d4a373;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="box">
        <p id="updated" style="font-size:0.8em; color:#64748b;">Last Updated: 2026-02-28 17:46:29 UTC</p>
        <div id="bridge-info" style="display: none; margin-bottom: 2rem;">
            <p style="color: #fff; font-weight: 600;">Tunnel Security Bridge</p>
            <p style="font-size: 0.9rem; opacity: 0.8;">If prompted for a tunnel password, please use:</p>
            <div
                style="background: rgba(212, 163, 115, 0.1); padding: 1rem; border-radius: 10px; margin: 1rem 0; font-family: monospace; font-size: 1.2rem; border: 1px dashed rgba(212, 163, 115, 0.3);">
                87.196.81.20
            </div>
        </div>
        <p id="msg">Connecting to Sovereign Portal...</p>
        <p><a id="link" href="#">Click here if not redirected automatically</a></p>
    </div>
    <script>
        // Use the GitHub Pages Sovereign Portal as the permanent target
        var permanentPortalLocation = "https://dours-d.github.io/local-ai-campaign-assistant/index.html";

        // Logic for Tailscale (Broken Tunnel) Handoff
        if (window.location.hostname.includes("tailscale.net") || window.location.hostname.includes("ts.net")) {
            if (!window.location.href.includes("dours-d.github.io")) {
                console.log("Redirecting from legacy/broken tunnel to permanent location.");
                window.location.replace(permanentPortalLocation + window.location.search + window.location.hash);
                throw new Error("Redirecting to permanent location");
            }
        }

        // Loop Protection for Vercel Deployment
        if (window.location.hostname.includes("vercel.app")) {
            window.location.replace("/onboarding/index.html" + window.location.search + window.location.hash);
            throw new Error("Redirecting to internal app");
        }

        // Dynamic Resolver for the New Vercel "Glass" Layer
        async function initializeRedirect() {
            let targetUrl = ""; // Default/Fallback

            try {
                const response = await fetch('data/status.json?t=' + Date.now());
                if (response.ok) {
                    const status = await response.json();
                    targetUrl = status.services.onboarding_server.public_url;
                }
            } catch (e) {
                console.warn("Status registry unreachable. Using fallback.");
            }

            // Detect Localtunnel to show bridge info
            if (targetUrl.includes("loca.lt")) {
                document.getElementById('bridge-info').style.display = 'block';
                document.getElementById('msg').innerText = "Preparing secure tunnel access...";
            }

            // Handle path/hash for deep links
            var path = window.location.pathname;
            var hash = window.location.hash;
            var beneficiaryId = "";

            if (hash && hash.length > 1) {
                beneficiaryId = hash.substring(1);
                if (beneficiaryId.startsWith('/')) beneficiaryId = beneficiaryId.substring(1);
            }

            // Construct clean path
            var destination = beneficiaryId ? "/onboard/" + beneficiaryId : "/onboard";
            var search = window.location.search || "";
            var finalUrl = targetUrl + destination + search;

            document.getElementById("link").href = finalUrl;

            // Wait 3 seconds for Localtunnel to let user read the password
            const waitTime = targetUrl.includes("loca.lt") ? 3500 : 1000;
            setTimeout(() => {
                document.getElementById('msg').innerText = "Redirecting now...";
                window.location.replace(finalUrl);
            }, waitTime);
        }

        initializeRedirect();
    </script>
</body>

</html>
