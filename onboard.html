<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Gaza Resilience Portal...</title>
    <style>
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1612;
            color: #d4a373;
        }

        .box {
            text-align: center;
            padding: 2.5rem;
            background: rgba(212, 163, 115, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(212, 163, 115, 0.1);
        }

        a {
            color: #d4a373;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="box">
        <p id="updated" style="font-size:0.8em; color:#64748b;">Last Updated: 2026-02-16 23:22:06 UTC</p>
        <p id="msg">Connecting to Sovereign Portal...</p>
        <p><a id="link" href="#">Click here if not redirected automatically</a></p>
    </div>
    <script>
        // Loop Protection for Vercel Deployment
        if (window.location.hostname.includes("vercel.app")) {
            // We are on Vercel but served the root redirector instead of the app.
            // Redirect explicitly to the app location.
            window.location.replace("/onboarding/index.html" + window.location.search + window.location.hash);
            throw new Error("Redirecting to internal app");
        }

        // Legacy Redirector to the New Vercel "Glass" Layer
        var githubOnboardingUrl = "https://local-ai-campaign-assistant.vercel.app";

        // Handle path/hash for deep links
        var path = window.location.pathname;
        var hash = window.location.hash;
        var beneficiaryId = "";

        if (hash && hash.length > 1) {
            beneficiaryId = hash.substring(1);
            if (beneficiaryId.startsWith('/')) beneficiaryId = beneficiaryId.substring(1);
        } else if (path.includes("/onboard/")) {
            beneficiaryId = path.split("/onboard/")[1];
        } else if (path.includes("/onboarding/")) {
            beneficiaryId = path.split("/onboarding/")[1];
        }

        // Construct clean Vercel path
        var destination = beneficiaryId ? "/onboard/" + beneficiaryId : "/onboard";
        var search = window.location.search || "";
        var finalUrl = githubOnboardingUrl + destination + search;

        document.getElementById("link").href = finalUrl;
        document.getElementById("msg").innerText = "Redirecting to Sovereign Portal...";
        setTimeout(() => { window.location.replace(finalUrl); }, 1000);
    </script>
</body>

</html>
