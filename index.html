<body>
    <div class="box">
        <h1 style="font-size: 1.2rem; margin-bottom: 1rem;">Gaza Resilience Portal</h1>
        <p id="updated" style="font-size:0.8em; color:#64748b;">Last Updated: 2026-03-04 02:22:12 UTC</p>
        <p id="msg">Connecting to Sovereign Portal...</p>
        <p><a id="link" href="#">Click here if not redirected automatically</a></p>
    </div>
    <script>
        // Use the GitHub Pages Noor Portal as the permanent target
        var permanentBrainLocation = "https://dours-d.github.io/local-ai-campaign-assistant/brain.html";

        // Updated automatically by monitor script
        var githubOnboardingUrl = "https://permit-tamil-facing-patent.trycloudflare.com";

        // Logic for Tailscale (Broken Tunnel) Handoff
        if (window.location.hostname.includes("tailscale.net") || window.location.hostname.includes("ts.net")) {
            console.log("Redirecting from legacy/broken tunnel to permanent location.");
            window.location.replace(permanentBrainLocation + window.location.search + window.location.hash);
            throw new Error("Redirecting to permanent location");
        }

        // Loop Protection for Vercel Deployment
        if (window.location.hostname.includes("vercel.app")) {
            window.location.replace("/onboarding/index.html" + window.location.search + window.location.hash);
            throw new Error("Redirecting to internal app");
        }

        // Handle hash routing for deep links
        var hash = window.location.hash;


        if (hash && hash.length > 1) {
            // Clean hash to isolate ID
            var cleanHash = hash.substring(1);
            if (cleanHash.startsWith('/onboard/')) cleanHash = cleanHash.replace('/onboard/', '');
            else if (cleanHash.startsWith('onboard/')) cleanHash = cleanHash.replace('onboard/', '');
            else if (cleanHash.startsWith('/')) cleanHash = cleanHash.substring(1);

            destination = "/onboard/" + cleanHash;
        } else if (window.location.pathname.includes("brain.html")) {
            destination = "/brain";
        } else {
            destination = "/onboard";
        }

        var search = window.location.search || "";
        // Construct the redirection to the bridge page
        var bridgeUrl = "./onboard.html" + window.location.hash + window.location.search;

        document.getElementById("link").href = bridgeUrl;
        document.getElementById("msg").innerText = "Redirecting to Sovereign Portal Bridge...";
        setTimeout(() => { window.location.replace(bridgeUrl); }, 1000);
    </script>
